services:
  db:
    image: postgres:18-alpine
    container_name: personal-website-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_website
      POSTGRES_USER: applezk
      POSTGRES_PASSWORD: applezk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d personal_website"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
